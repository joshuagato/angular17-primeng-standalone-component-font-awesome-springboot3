<div class="flex align-content-center">
  @if (imageUrl() != null) {
    <img [ngClass]="avatarSize()" alt="user-avatar" class="border-round-3xl avatar"
         src="{{imageUrl()}}">
  } @else {
    <div [ngClass]="avatarSize()"
         class="flex align-items-center justify-content-center unknown-user">
      <fa-icon [icon]="'user'" class="text-dark"></fa-icon>
    </div>
  }
</div>
