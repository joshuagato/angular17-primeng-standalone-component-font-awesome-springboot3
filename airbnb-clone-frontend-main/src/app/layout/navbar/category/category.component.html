@if (isHome) {
  <div class="categories pt-3 mx-8">
    @for (category of categories; track category.technicalName) {
      @if (category.technicalName !== 'ALL') {
        <div (click)="onChangeCategory(category)"
             [class.category-activated]="category.activated" class="flex flex-column align-items-center pb-3 category">
          <fa-icon [icon]="category.icon" class="mb-1"></fa-icon>
          <div class="name" title="{{category.displayName}}">{{ category.displayName }}</div>
        </div>
      }
    }
  </div>
}
